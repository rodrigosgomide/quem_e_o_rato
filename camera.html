<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Câmera — Ratas</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 1rem;
        background: #111;
        color: #eee;
        text-align: center;
      }
      video {
        width: 100%;
        max-width: 480px;
        border-radius: 8px;
      }
      #status {
        margin-top: 1rem;
        font-size: 1rem;
        min-height: 1.4rem;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline muted></video>

    <canvas id="canvas-atual" style="display: none"></canvas>
    <canvas id="canvas-anterior" style="display: none"></canvas>

    <div id="status">Iniciando câmera...</div>

    <!-- TensorFlow.js — versão browser (não precisa de Node) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

    <script type="module">
      import { inserirCaptura, CLASSES } from './db.js';

      // ── Configuração ────────────────────────────────────────────────────────
      const LIMIAR_MOVIMENTO = 0.15; // 15% de pixels diferentes → movimento
      const INTERVALO_MS = 500; // verifica a cada 500ms
      const COOLDOWN_MS = 5000; // aguarda 5s entre capturas
      const IMG_SIZE = 224;
      // Resolução reduzida para a detecção de movimento (evita travar a thread
      // principal processando milhões de pixels por frame).
      const MOV_W = 96;
      const MOV_H = 72;

      // ── Estado ──────────────────────────────────────────────────────────────
      let modelo = null;
      let primeiroFrame = true;
      let ultimaCaptura = 0;
      let classificando = false; // trava de reentrada
      let intervalo = null;

      const video = document.getElementById('video');
      // Canvases pequenos e fixos só para o diff de movimento.
      const canvasAtual = document.getElementById('canvas-atual');
      const canvasAnterior = document.getElementById('canvas-anterior');
      canvasAtual.width = canvasAnterior.width = MOV_W;
      canvasAtual.height = canvasAnterior.height = MOV_H;
      const ctxAtual = canvasAtual.getContext('2d', {
        willReadFrequently: true,
      });
      const ctxAnterior = canvasAnterior.getContext('2d', {
        willReadFrequently: true,
      });
      const statusEl = document.getElementById('status');

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      async function carregarModelo() {
        setStatus('Carregando modelo...');
        modelo = await tf.loadLayersModel('./modelo/model.json');
        // "Aquece" o backend para que a 1ª inferência não trave a UI.
        tf.tidy(() => modelo.predict(tf.zeros([1, IMG_SIZE, IMG_SIZE, 3])));
      }

      async function iniciar() {
        // ── Carregar modelo ───────────────────────────────────────────────────
        try {
          await carregarModelo();
        } catch (err) {
          setStatus('Erro ao carregar o modelo: ' + err.message);
          return;
        }
        setStatus('Modelo carregado. Aguardando câmera...');

        // ── Iniciar câmera ──────────────────────────────────────────────────────
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false,
          });
        } catch (err) {
          setStatus('Erro ao acessar a câmera: ' + err.message);
          return;
        }
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          setStatus('Monitorando...');
          if (intervalo) clearInterval(intervalo);
          intervalo = setInterval(verificarMovimento, INTERVALO_MS);
        };
      }

      // ── Detecção de movimento ──────────────────────────────────────────────
      function verificarMovimento() {
        if (classificando) return; // não acumula trabalho durante inferência

        if (primeiroFrame) {
          ctxAnterior.drawImage(video, 0, 0, MOV_W, MOV_H);
          primeiroFrame = false;
          return;
        }

        ctxAtual.drawImage(video, 0, 0, MOV_W, MOV_H);

        const dadosAtual = ctxAtual.getImageData(0, 0, MOV_W, MOV_H).data;
        const dadosAnterior = ctxAnterior.getImageData(0, 0, MOV_W, MOV_H).data;

        let pixelsDiferentes = 0;
        const totalPixels = dadosAtual.length / 4;

        for (let i = 0; i < dadosAtual.length; i += 4) {
          const dr = Math.abs(dadosAtual[i] - dadosAnterior[i]);
          const dg = Math.abs(dadosAtual[i + 1] - dadosAnterior[i + 1]);
          const db = Math.abs(dadosAtual[i + 2] - dadosAnterior[i + 2]);
          if (dr + dg + db > 30) pixelsDiferentes++;
        }

        const pct = pixelsDiferentes / totalPixels;
        ctxAnterior.drawImage(canvasAtual, 0, 0);

        const agora = Date.now();
        if (pct > LIMIAR_MOVIMENTO && agora - ultimaCaptura > COOLDOWN_MS) {
          ultimaCaptura = agora;
          classificar();
        }
      }

      // ── Inferência ──────────────────────────────────────────────────────────
      async function classificar() {
        if (classificando) return;
        classificando = true;
        setStatus('Movimento detectado! Classificando...');

        try {
          // tf.tidy libera TODOS os tensores criados aqui (entrada + saída),
          // pois retornamos um array comum, não um tensor. Sem vazamento.
          const probs = tf.tidy(() => {
            const entrada = tf.browser
              .fromPixels(video) // lê direto do vídeo
              .toFloat()
              .div(255)
              .expandDims(0);
            const redimensionada = tf.image.resizeBilinear(entrada, [
              IMG_SIZE,
              IMG_SIZE,
            ]);
            return modelo.predict(redimensionada).dataSync();
          });

          let indice = 0;
          for (let i = 1; i < probs.length; i++) {
            if (probs[i] > probs[indice]) indice = i;
          }
          const rataNome = CLASSES[indice];
          const confianca = probs[indice];

          setStatus(`Rata: ${rataNome} — ${Math.round(confianca * 100)}%`);
          setTimeout(() => setStatus('Monitorando...'), 2000);
        } catch (err) {
          console.error('Erro na classificação:', err);
          setStatus('Erro na classificação: ' + err.message);
          setTimeout(() => setStatus('Monitorando...'), 2000);
        } finally {
          classificando = false;
        }
      }

      // ── Recuperação de perda de contexto WebGL ──────────────────────────────
      // Em celulares, pressão de memória do GPU pode derrubar o contexto WebGL;
      // sem isso a página fica "travada" e nem o refresh recarrega o modelo.
      window.addEventListener(
        'webglcontextlost',
        (e) => {
          e.preventDefault();
          console.warn('Contexto WebGL perdido — tentando recuperar...');
          setStatus('Recuperando GPU...');
        },
        true,
      );

      iniciar();
    </script>
  </body>
</html>
